name: CI

on:
    push:
        branches: ["master"]
    pull_request:

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Java 23
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "23"
                  cache: maven

            - name: Run tests
              run: mvn -B test
